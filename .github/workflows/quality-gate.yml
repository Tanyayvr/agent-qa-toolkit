name: Quality Gate

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Full Quality Gate
        run: npm run quality:gate

      - name: Python Conformance Parity
        run: npm run conformance:test:python

      - name: Policy Gate E2E
        run: npm run e2e:policy-gate

      - name: Runtime Policy E2E
        run: npm run e2e:runtime-policy -- --ci

      - name: Plugins Release Readiness
        run: npm run plugins:release-readiness

      - name: Soak/Load E2E (CI)
        run: npm run e2e:soak-load -- --ci
